<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hansoll AI Portal - Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .gradient-text {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            color: #64748b;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #2563eb; }
        .tab-btn.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }
        
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        /* File drop zone */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="p-8 w-full h-screen overflow-y-auto custom-scrollbar bg-slate-50/50">
    
    <div class="max-w-7xl mx-auto">
        <!-- Top Menu Bar -->
        <div class="bg-white shadow-sm rounded-xl mb-8 flex px-4">
            <button class="tab-btn active" onclick="switchTab('home')">Home</button>
            <button class="tab-btn" onclick="switchTab('menu')">메뉴관리</button>
            <button class="tab-btn" onclick="switchTab('password')">비밀번호 변경</button>
        </div>

        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight mb-2">Admin <span class="gradient-text">Dashboard</span></h1>
                <p class="text-slate-500 font-medium">포털 시스템 관리 및 운영 현황</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="menu-filter-select" onchange="applyMenuFilter()" class="border border-slate-300 rounded-lg px-4 py-2 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 bg-white cursor-pointer shadow-sm">
                    <option value="all">전체</option>
                    <option value="active">사용중</option>
                    <option value="hidden">사용 중지</option>
                </select>
            </div>
        </div>

        <!-- TAB: HOME -->
        <div id="tab-home" class="block">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-10">
                <div class="glass-card rounded-2xl p-6 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-blue-100/50 rounded-xl text-blue-600">
                            <i data-lucide="layers" class="w-6 h-6"></i>
                        </div>
                    </div>
                    <h3 class="text-slate-500 text-sm font-semibold mb-1">AI 총 개발 건수</h3>
                    <p class="text-3xl font-extrabold text-slate-800" id="stat-total">0<span class="text-base font-medium text-slate-400 ml-1">건</span></p>
                </div>

                <div class="glass-card rounded-2xl p-6 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-purple-100/50 rounded-xl text-purple-600">
                            <i data-lucide="briefcase" class="w-6 h-6"></i>
                        </div>
                    </div>
                    <h3 class="text-slate-500 text-sm font-semibold mb-1">총 부서 카테고리 수</h3>
                    <p class="text-3xl font-extrabold text-slate-800" id="stat-dept">0<span class="text-base font-medium text-slate-400 ml-1">개</span></p>
                </div>

                <div class="glass-card rounded-2xl p-6 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-amber-100/50 rounded-xl text-amber-600">
                            <i data-lucide="folder-x" class="w-6 h-6"></i>
                        </div>
                    </div>
                    <h3 class="text-slate-500 text-sm font-semibold mb-1">카테고리 숨김 건수</h3>
                    <p class="text-3xl font-extrabold text-slate-800" id="stat-hidden-cat">0<span class="text-base font-medium text-slate-400 ml-1">개</span></p>
                </div>

                <div class="glass-card rounded-2xl p-6 transition-transform hover:-translate-y-1 duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-rose-100/50 rounded-xl text-rose-600">
                            <i data-lucide="eye-off" class="w-6 h-6"></i>
                        </div>
                    </div>
                    <h3 class="text-slate-500 text-sm font-semibold mb-1">메뉴 숨김 건수</h3>
                    <p class="text-3xl font-extrabold text-slate-800" id="stat-hidden">0<span class="text-base font-medium text-slate-400 ml-1">건</span></p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Dept breakdown -->
                <div class="glass-card rounded-2xl border border-slate-200 overflow-hidden flex flex-col p-6">
                    <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <i data-lucide="bar-chart-2" class="w-5 h-5 text-indigo-500"></i> 부서별 개발 건수
                    </h2>
                    <div class="space-y-4" id="dept-breakdown-list">
                        <!-- Populated via JS -->
                    </div>
                </div>

                <!-- Hidden menus list -->
                <div class="glass-card rounded-2xl border border-slate-200 overflow-hidden flex flex-col p-6">
                    <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <i data-lucide="eye-off" class="w-5 h-5 text-rose-500"></i> 숨김처리 된 리스트
                    </h2>
                    <div class="space-y-3" id="hidden-menus-list">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: MENU MANAGEMENT -->
        <div id="tab-menu" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="folder-tree" class="w-5 h-5 text-blue-600"></i> 포털 메뉴 관리
                </h2>
                <div class="flex gap-3">
                    <button onclick="applyChanges()" class="px-4 py-2 bg-emerald-500 rounded-lg text-sm font-bold text-white hover:bg-emerald-600 shadow-md transition-all flex items-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> 변경사항 저장
                    </button>
                    <button onclick="openCategoryModal()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 shadow-sm transition-all flex items-center gap-2">
                        <i data-lucide="folder-plus" class="w-4 h-4"></i> 카테고리 추가
                    </button>
                    <button onclick="openMenuModal()" class="px-4 py-2 bg-blue-600 rounded-lg text-sm font-bold text-white hover:bg-blue-700 shadow-md transition-all flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> 메뉴 추가
                    </button>
                </div>
            </div>

            <!-- Categories Container -->
            <div class="space-y-4" id="categories-container">
                <!-- Categories will be rendered here -->
            </div>
        </div>

        <!-- TAB: PASSWORD -->
        <div id="tab-password" class="hidden">
            <div class="glass-card rounded-2xl border border-slate-200 overflow-hidden flex flex-col p-8 max-w-lg mx-auto mt-10">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="shield-check" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800">관리자 비밀번호 변경</h2>
                    <p class="text-sm text-slate-500 mt-2">새로운 관리자 비밀번호를 설정합니다.</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">새 비밀번호</label>
                        <input type="password" id="new-admin-pw" class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="4~8자리 입력">
                    </div>
                    <button onclick="changeAdminPw()" class="w-full py-3 bg-slate-800 text-white rounded-lg text-sm font-bold hover:bg-slate-900 transition-colors shadow-sm">비밀번호 변경 적용</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <!-- Category Modal -->
    <div id="category-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-4">새 카테고리 추가</h3>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1">카테고리명 (부서명 등)</label>
                <input type="text" id="cat-name-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: IT부">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1">표시 문구</label>
                <input type="text" id="cat-display-phrase-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: Information Technology">
            </div>
            <div class="mb-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">배경색</label>
                        <input type="color" id="cat-bg-color-input" class="w-full h-10 p-1 border border-slate-300 rounded-lg cursor-pointer bg-white" value="#050505">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">글자색</label>
                        <input type="color" id="cat-text-color-input" class="w-full h-10 p-1 border border-slate-300 rounded-lg cursor-pointer bg-white" value="#ffffff">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeCategoryModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-semibold transition-colors">취소</button>
                <button onclick="submitCategory()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors">추가</button>
            </div>
        </div>
    </div>

    <!-- Edit Category Modal -->
    <div id="edit-category-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="edit" class="w-5 h-5 text-blue-600"></i> 상위 카테고리 변경
            </h3>
            <input type="hidden" id="edit-cat-index-input">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1">카테고리명 (부서명 등) <span class="text-rose-500">*</span></label>
                <input type="text" id="edit-cat-name-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: IT부">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-1">표시 문구</label>
                <input type="text" id="edit-cat-display-phrase-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="예: Information Technology">
            </div>
            <div class="mb-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">배경색</label>
                        <input type="color" id="edit-cat-bg-color-input" class="w-full h-10 p-1 border border-slate-300 rounded-lg cursor-pointer bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">글자색</label>
                        <input type="color" id="edit-cat-text-color-input" class="w-full h-10 p-1 border border-slate-300 rounded-lg cursor-pointer bg-white">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <button onclick="closeEditCategoryModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-semibold transition-colors">취소</button>
                <button onclick="submitEditCategory()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors">저장</button>
            </div>
        </div>
    </div>

    <!-- Menu Modal -->
    <div id="menu-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <h3 class="text-xl font-bold text-slate-800 mb-4">새 메뉴 추가</h3>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">상위 카테고리 선택</label>
                    <select id="menu-cat-select" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        <!-- Options via JS -->
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">메뉴명 <span class="text-rose-500">*</span></label>
                    <input type="text" id="menu-name-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="메뉴 이름">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">설명 <span class="text-rose-500">*</span></label>
                    <input type="text" id="menu-desc-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="간단한 설명">
                </div>

                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <input type="checkbox" id="menu-url-checkbox" onchange="toggleUrlMode()" class="w-4 h-4 text-blue-600 bg-slate-50 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                        <label for="menu-url-checkbox" class="text-sm font-semibold text-slate-700 cursor-pointer">실행 url 주소</label>
                    </div>
                    <input type="text" id="menu-url-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:bg-slate-100 disabled:cursor-not-allowed" placeholder="예: https://example.com" disabled>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1" id="file-upload-label">파일 첨부 (실행파일, HTML, 파이썬 등)</label>
                    <div id="drop-zone" class="drop-zone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" onclick="document.getElementById('file-input').click()">
                        <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-400 mx-auto mb-2"></i>
                        <p class="text-sm text-slate-500" id="drop-zone-text">파일을 드래그하거나 클릭하여 선택하세요.</p>
                        <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(event)">
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeMenuModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-semibold transition-colors">취소</button>
                <button onclick="submitMenu()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors flex items-center gap-2" id="submit-menu-btn">
                    저장
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Menu Modal -->
    <div id="edit-menu-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-4xl w-full shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="edit" class="w-5 h-5 text-blue-600"></i> 메뉴 실행 파일/URL 변경
            </h3>
            
            <div class="flex flex-col md:flex-row gap-8">
                <!-- Left Column: Current Info -->
                <div class="w-full md:w-1/2 p-6 bg-slate-50 rounded-xl border border-slate-200 flex flex-col">
                    <h4 class="text-sm font-bold text-slate-700 mb-4 border-b border-slate-200 pb-2">현재 연결된 대상</h4>
                    <div id="edit-current-info" class="text-sm text-slate-600 space-y-3 mb-6">
                        <!-- Filled by JS -->
                    </div>
                    
                    <h4 class="text-sm font-bold text-slate-700 mb-3 border-b border-slate-200 pb-2">메뉴명 변경</h4>
                    <div class="space-y-3">
                        <input type="text" id="edit-menu-name-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="새로운 메뉴명 입력">
                        
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" id="edit-name-only-checkbox" onchange="toggleEditNameOnlyMode()" class="w-4 h-4 text-blue-600 bg-slate-50 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                            <label for="edit-name-only-checkbox" class="text-sm font-semibold text-slate-700 cursor-pointer">메뉴명만 변경 (파일/URL 유지)</label>
                        </div>
                    </div>
                </div>

                <!-- Right Column: New Input -->
                <div id="edit-right-col" class="w-full md:w-1/2 space-y-5 border-l border-slate-100 pl-0 md:pl-8 transition-opacity duration-200">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <input type="checkbox" id="edit-url-checkbox" onchange="toggleEditUrlMode()" class="w-4 h-4 text-blue-600 bg-slate-50 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                            <label for="edit-url-checkbox" class="text-sm font-semibold text-slate-700 cursor-pointer">새 실행 url 주소로 변경</label>
                        </div>
                        <input type="text" id="edit-url-input" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:bg-slate-100 disabled:cursor-not-allowed" placeholder="예: https://example.com" disabled>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2" id="edit-file-upload-label">새 파일 첨부로 변경</label>
                        <div id="edit-drop-zone" class="drop-zone" ondragover="handleEditDragOver(event)" ondragleave="handleEditDragLeave(event)" ondrop="handleEditDrop(event)" onclick="document.getElementById('edit-file-input').click()">
                            <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-400 mx-auto mb-2"></i>
                            <p class="text-sm text-slate-500" id="edit-drop-zone-text">파일을 드래그하거나 클릭하여 선택하세요.</p>
                            <input type="file" id="edit-file-input" class="hidden" onchange="handleEditFileSelect(event)">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-slate-100">
                <button onclick="closeEditMenuModal()" class="px-5 py-2.5 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-semibold transition-colors">취소</button>
                <button onclick="submitEditMenu()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors flex items-center gap-2" id="submit-edit-menu-btn">
                    변경 내용 저장
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let globalMenuData = [];
        let sortableInstance = null;
        let selectedFile = null;

        const SUPABASE_URL = 'https://yuklsrhmcbdanswxysrw.supabase.co';

        async function loadMenuData(retries = 10) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/MenuSetting?select=*`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    cache: 'no-store'
                });
                if(res.ok) {
                    const flatData = await res.json();
                    if(flatData && flatData.length > 0) {
                        const categories = flatData.filter(d => d.menu_type === 'category' || d.menu_type === '카테고리');
                        
                        categories.sort((a, b) => ((a.menu_meta && a.menu_meta.sortOrder) || 0) - ((b.menu_meta && b.menu_meta.sortOrder) || 0));

                        globalMenuData = categories.map(cat => {
                            const meta = cat.menu_meta || {};
                            let subItems = flatData.filter(sub => sub.menu_type !== '카테고리' && sub.menu_type !== 'category' && (sub.menu_meta && sub.menu_meta.parentCategory === cat.menu_name)).map(sub => {
                                const subMeta = sub.menu_meta || {};
                                return {
                                    title: sub.menu_name,
                                    description: subMeta.description || "",
                                    status: sub.YN_use ? 'Y' : 'N',
                                    isPrivate: sub.YN_view === 'Y',
                                    fileName: sub.file_path || "",
                                    menuId: sub.MenuId || sub.menu_name,
                                    folderName: subMeta.folderName || sub.menu_name,
                                    urlAddress: sub.url_address || "",
                                    sortOrder: subMeta.sortOrder || 0
                                };
                            });
                            
                            subItems.sort((a, b) => a.sortOrder - b.sortOrder);

                            return {
                                title: cat.menu_name,
                                slug: meta.slug || "",
                                imageUrl: meta.imageUrl || "",
                                icon: meta.icon || "",
                                status: cat.YN_use ? 'Y' : 'N',
                                isPrivate: cat.YN_view === 'Y',
                                displayPhrase: meta.displayPhrase || "",
                                bgColor: meta.bgColor || "#050505",
                                textColor: meta.textColor || "#ffffff",
                                menuId: cat.MenuId,
                                subItems: subItems
                            };
                        });
                        
                        globalMenuData.forEach(cat => {
                            if (cat.subItems) {
                                cat.subItems.forEach(sub => {
                                    if (typeof sub === 'object' && !sub.menuId) {
                                        sub.menuId = sub.title;
                                    }
                                });
                            }
                        });
                        renderDashboard();
                        renderMenuManager();
                        return;
                    }
                }
                throw new Error("Invalid response or empty data");
            } catch(e) {
                if (retries > 0) {
                    console.log(`Failed to load menu data. Retrying in 1s... (${retries} retries left)`);
                    setTimeout(() => loadMenuData(retries - 1), 1000);
                    return;
                }
                console.error("Failed to load menu data completely", e);
                try {
                    if (window.parent && window.parent.menuData) {
                        globalMenuData = JSON.parse(JSON.stringify(window.parent.menuData));
                    } else {
                        throw new Error("No parent data");
                    }
                } catch(err) {
                    globalMenuData = [];
                }
                globalMenuData.forEach(cat => {
                    if (cat.subItems) {
                        cat.subItems.forEach(sub => {
                            if (typeof sub === 'object' && !sub.menuId) {
                                sub.menuId = sub.title;
                            }
                        });
                    }
                });
                renderDashboard();
                renderMenuManager();
            }
        }

        async function saveData() {
            try {
                const records = [];
                globalMenuData.forEach((cat, index) => {
                    records.push({
                        MenuId: cat.menuId,
                        menu_path: "",
                        menu_name: cat.title,
                        menu_type: '카테고리',
                        file_path: null,
                        url_address: "",
                        YN_use: (cat.status || 'Y') === 'Y',
                        YN_view: cat.isPrivate ? 'Y' : 'N',
                        menu_meta: {
                            icon: cat.icon,
                            slug: cat.slug,
                            bgColor: cat.bgColor,
                            imageUrl: cat.imageUrl,
                            textColor: cat.textColor,
                            displayPhrase: cat.displayPhrase,
                            sortOrder: index
                        }
                    });

                    if (cat.subItems) {
                        cat.subItems.forEach((sub, subIndex) => {
                            let subTitle = typeof sub === 'string' ? sub : sub.title;
                            let subDesc = typeof sub === 'string' ? null : sub.description;
                            let subStatus = typeof sub === 'string' ? 'Y' : (sub.status || 'Y');
                            let subFile = typeof sub === 'string' ? null : sub.fileName;
                            let menuId = (typeof sub === 'object' && sub.menuId) ? sub.menuId : subTitle;
                            let folderName = (typeof sub === 'object' && sub.folderName) ? sub.folderName : subTitle;
                            let urlAddr = (typeof sub === 'object' && sub.urlAddress) ? sub.urlAddress : "";

                            let typeText = "정보 없음";
                            let isUrl = false;
                            if (subFile) {
                                if (subFile.endsWith('.txt')) { typeText = "URL 링크"; isUrl = true; }
                                else if (subFile.endsWith('.html')) typeText = "HTML 웹페이지";
                                else if (subFile.endsWith('.py')) typeText = "파이썬 스크립트";
                                else if (subFile !== "정보 없음") typeText = "실행 파일 (" + subFile.split('.').pop() + ")";
                            }

                            records.push({
                                MenuId: menuId,
                                menu_path: subFile && subFile !== "정보 없음" ? `Project files/${cat.title}/${folderName}/${subFile}` : "",
                                menu_name: subTitle,
                                menu_type: typeText,
                                file_path: subFile,
                                url_address: isUrl ? urlAddr : "",
                                YN_use: subStatus === 'Y',
                                YN_view: sub.isPrivate ? 'Y' : 'N',
                                menu_meta: {
                                    description: subDesc,
                                    folderName: folderName,
                                    parentCategory: cat.title,
                                    sortOrder: subIndex
                                }
                            });
                        });
                    }
                });

                const res = await fetch(`${SUPABASE_URL}/rest/v1/MenuSetting?select=MenuId`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                if (res.ok) {
                    const currentRecords = await res.json();
                    const currentIds = currentRecords.map(r => r.MenuId);
                    const newIds = records.map(r => r.MenuId);
                    const idsToDelete = currentIds.filter(id => !newIds.includes(id));
                    
                    if (idsToDelete.length > 0) {
                        await fetch(`${SUPABASE_URL}/rest/v1/MenuSetting?MenuId=in.(${idsToDelete.join(',')})`, {
                            method: 'DELETE',
                            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                        });
                    }
                }

                const postRes = await fetch(`${SUPABASE_URL}/rest/v1/MenuSetting?on_conflict=MenuId`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'resolution=merge-duplicates'
                    },
                    body: JSON.stringify(records)
                });
                if (!postRes.ok) {
                    const errText = await postRes.text();
                    console.error("Supabase upsert failed:", errText);
                    throw new Error("Supabase upsert failed: " + postRes.statusText);
                }
            } catch(e) {
                console.error("Failed to save menu data", e);
                alert("메뉴 저장 중 오류가 발생했습니다: " + e.message);
            }
        }

            try {
                const res = await fetch('http://localhost:3000/api/delete-menu', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: cat.title, menuName: title })
                });

                if(!res.ok) {
                    console.error("Failed to delete physical folder");
                }
                
                // MenualPage (말풍선/매뉴얼) 테이블의 연관 데이터도 함께 삭제
                const menuId = (typeof sub === 'object' && sub.menuId) ? sub.menuId : title;
                try {
                    await fetch(`${SUPABASE_URL}/rest/v1/MenualPage?MenuId=eq.${encodeURIComponent(menuId)}`, {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }

                    console.error("Failed to delete MenualPage data", e);

                cat.subItems.splice(subIndex, 1);

            const cat = globalMenuData[index];
            const oldName = cat.title;
            
            const newName = document.getElementById('edit-cat-name-input').value.trim();
            const displayPhrase = document.getElementById('edit-cat-display-phrase-input').value.trim();
            const bgColor = document.getElementById('edit-cat-bg-color-input').value;

            if(!newName) return alert("카테고리명을 입력하세요.");
            
            // Check if name changed and new name already exists
            if (oldName !== newName && globalMenuData.find(c => c.title === newName)) {
                return alert("이미 존재하는 카테고리명입니다.");
            }

            try {
                if (oldName !== newName) {
                    const res = await fetch('http://localhost:3000/api/rename-cat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ oldName, newName })
                    });
                    
                    const result = await res.json();
                    if (!res.ok) {
                        if (result.error === 'ALREADY_EXISTS') {
                            return alert('해당 이름의 폴더가 이미 존재합니다.');
                        }
                        if (result.error === 'OLD_DIR_NOT_FOUND') {

                        } else {
                            throw new Error(result.error || 'Failed to rename folder');
                        }
                    }
                }

                // Update data
                cat.title = newName;
                cat.slug = newName.toLowerCase().replace(/\s+/g, '-');
                cat.displayPhrase = displayPhrase;
                cat.bgColor = bgColor;
                cat.textColor = textColor;

                await applyChanges();
                closeEditCategoryModal();
                renderMenuManager();
                renderDashboard();
            } catch(e) {
                alert("변경 저장에 실패했습니다. 서버 상태를 확인해주세요.");

        async function submitMenu() {
            const catIndex = document.getElementById('menu-cat-select').value;
            const menuName = document.getElementById('menu-name-input').value.trim();
            const desc = document.getElementById('menu-desc-input').value.trim();
            const isUrlMode = document.getElementById('menu-url-checkbox').checked;
            let urlValue = document.getElementById('menu-url-input').value.trim();
            
            if(!menuName) return alert("메뉴명을 입력하세요.");
            if(!desc) return alert("메뉴 설명을 입력하세요.");

            let finalFile = selectedFile;

            if (isUrlMode) {
                if (!urlValue) return alert("실행할 URL 주소를 입력하세요.");
                if (!urlValue.startsWith('http://') && !urlValue.startsWith('https://')) {
                    urlValue = 'https://' + urlValue;
                }
                const fileContent = `${urlValue}\n\n설명 : ${desc}`;
                finalFile = new File([fileContent], `${menuName}.txt`, { type: "text/plain" });
            } else {
                if(!finalFile) return alert("파일을 첨부해주세요.");
            }

            const cat = globalMenuData[catIndex];
            const btn = document.getElementById('submit-menu-btn');
            btn.innerText = "저장 중...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('category', cat.title);
            formData.append('menuName', menuName);
            formData.append('file', finalFile);

            try {
                // 1. 항상 Supabase Storage로 직접 업로드 (가장 확실한 방법)
                const folderName = menuName;
                const supabasePath = `${cat.title}/${folderName}/${finalFile.name}`;
                const encodedFilePath = encodeURIComponent(supabasePath);
                const storageKey = btoa(encodedFilePath).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
                const { data, error } = await supabaseClient.storage
                    .from('hansoll-files')
                    .upload(storageKey, finalFile, {
                        cacheControl: '3600',
                        upsert: true
                    });
                
                if (error) {
                    alert("클라우드 스토리지 파일 업로드에 실패했습니다: " + error.message);
                    throw error;
                }

                // 2. 로컬 서버(Antigravity 환경)용 백업 업로드 시도
                try {
                    let res = await fetch('http://localhost:3000/api/upload', { method: 'POST', body: formData });
                    if(!res.ok) {
                        if (res.status === 409) {
                            if (confirm("로컬에 동일한 이름의 파일이 있습니다. 해당 파일을 덮어쓰시겠습니까?")) {
                                formData.append('overwrite', 'true');
                                res = await fetch('http://localhost:3000/api/upload', { method: 'POST', body: formData });
                                if (!res.ok) console.warn("Local upload failed after overwrite request");
                            }
                        } else {
                            console.warn("Local upload failed");
                        }
                    }
                } catch(uploadErr) {
                    console.warn("로컬 서버가 구동 중이지 않습니다 (Vercel 환경 정상 작동).", uploadErr);
                }

                // Update data
                cat.subItems.push({
                    menuId: menuName,
                    title: menuName,
                    description: desc,
                    showHelpIcon: !!desc,
                    status: "Y",
                    isPrivate: true,
                    fileName: finalFile.name,
                    urlAddress: isUrlMode ? urlValue : ""
                });

                await saveData();
                alert("정상적으로 저장되었습니다. 화면을 새로고침합니다.");
                try {
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage({ type: 'UPDATE_PORTAL_MENU' }, '*');
                    }
                    window.location.reload();
                } catch(e) {
                    window.location.reload();
                }
            } catch(e) {
                alert("파일 업로드 또는 저장에 실패했습니다.");
                console.error(e);
            } finally {
                btn.innerHTML = `저장`;
                btn.disabled = false;
            }
        }

                return;

            localStorage.setItem("hansoll_admin_pw", newPw);
            alert("관리자 비밀번호가 성공적으로 변경되었습니다.");
            document.getElementById('new-admin-pw').value = "";
        }
    </script>
