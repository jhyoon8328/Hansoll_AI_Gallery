<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Transition</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; background-color: #050505; }
  </style>
</head>
<body id="transition-body">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Failsafe wrapper for transition data using URL Search Params to bypass CORS completely
    let transitionData = {
      text: "Loading...",
      bgColor: "#050505",
      textColor: "#ffffff"
    };

    try {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('text')) {
        transitionData = {
          text: urlParams.get('text'),
          bgColor: urlParams.get('bgColor') || "#050505",
          textColor: urlParams.get('textColor') || "#ffffff"
        };
      } else if (window.parent && window.parent.currentTransitionData) {
        transitionData = window.parent.currentTransitionData;
      }
    } catch (e) {
      console.warn("Could not access parent window.", e);
    }

    // Ensure valid colors
    if (!transitionData.bgColor) transitionData.bgColor = "#050505";
    if (!transitionData.textColor) transitionData.textColor = "#ffffff";
    if (transitionData.bgColor === transitionData.textColor) {
      transitionData.textColor = transitionData.bgColor === "#ffffff" ? "#000000" : "#ffffff";
    }

    document.getElementById('transition-body').style.backgroundColor = transitionData.bgColor;

    class Particle {
      constructor(x, y, targetX, targetY) {
        this.x = x || 0;
        this.y = y || 0;
        this.targetX = targetX || 0;
        this.targetY = targetY || 0;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.radius = Math.random() * 1.5 + 0.5;
        this.baseAlpha = Math.random() * 0.5 + 0.5;
        this.alpha = 0;
        this.scattered = false;
        this.color = transitionData.textColor;
      }

      update(stage) {
        if (stage === 'intro-forming' || stage === 'intro-holding') {
          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          // Softer spring and higher friction for a smoother, more elegant gathering
          this.vx += dx * 0.015;
          this.vy += dy * 0.015;
          this.vx *= 0.90;
          this.vy *= 0.90;
          
          this.x += this.vx + (Math.random() - 0.5) * 0.05;
          this.y += this.vy + (Math.random() - 0.5) * 0.05;
          
          if (this.alpha < this.baseAlpha) this.alpha += 0.015;
        } else if (stage === 'intro-scattering') {
          if (!this.scattered) {
            const angle = Math.random() * Math.PI * 2;
            // Less violent explosion, more elegant drift
            const force = Math.random() * 12 + 4;
            this.vx = Math.cos(angle) * force;
            this.vy = Math.sin(angle) * force;
            this.scattered = true;
          }
          // Add friction to scattering so it drifts smoothly
          this.vx *= 0.96;
          this.vy *= 0.96;
          this.x += this.vx;
          this.y += this.vy;
          // Slower fade out
          this.alpha -= 0.01;
        }
      }

      draw(ctx) {
        if (this.alpha <= 0 || isNaN(this.x) || isNaN(this.y)) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    const CanvasBackground = ({ stage }) => {
      const canvasRef = useRef(null);
      const particlesRef = useRef([]);
      const animationRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Failsafe width/height gathering
        let width = 1000;
        let height = 800;
        try {
          width = window.innerWidth || (window.parent ? window.parent.innerWidth : 1000);
          height = window.innerHeight || (window.parent ? window.parent.innerHeight : 800);
        } catch(e) {}
        
        if (width < 300) width = 1000;
        if (height < 300) height = 800;
        
        canvas.width = width;
        canvas.height = height;

        const initTextParticles = () => {
          const offscreen = document.createElement('canvas');
          const oCtx = offscreen.getContext('2d', { willReadFrequently: true });
          
          const offW = Math.max(100, Math.floor(width * 0.8));
          const offH = Math.max(100, Math.floor(height * 0.7));
          offscreen.width = offW;
          offscreen.height = offH;
          
          const textValue = String(transitionData.text || "Menu");
          // Safely split strings with either literal "\n" or actual newline
          const lines = textValue.split(/\\n|\n/);
          
          let fontSize = Math.floor(Math.max(40, Math.min(offW * 0.15, offH / (lines.length + 1))));
          
          oCtx.fillStyle = 'black';
          oCtx.fillRect(0, 0, offW, offH);
          
          oCtx.fillStyle = 'white';
          oCtx.font = `bold ${fontSize}px "Pretendard", Arial, sans-serif`;
          oCtx.textAlign = 'center';
          oCtx.textBaseline = 'middle';
          
          const lineHeight = Math.floor(fontSize * 1.2);
          const totalTextHeight = lineHeight * lines.length;
          const startY = (offH - totalTextHeight) / 2 + (fontSize / 2);

          lines.forEach((line, index) => {
            oCtx.fillText(line.trim(), offW / 2, startY + (index * lineHeight));
          });

          const imageData = oCtx.getImageData(0, 0, offW, offH).data;
          const particles = [];
          const step = Math.max(Math.floor(offW / 200), 3); 
          const offsetX = (width - offW) / 2;
          const offsetY = (height - offH) / 2;

          for (let y = 0; y < offH; y += step) {
            for (let x = 0; x < offW; x += step) {
              const red = imageData[((y * offW + x) * 4)];
              // Restore strict red > 128 check to avoid creating particles from black background pixels
              if (red > 128) {
                const startX = Math.random() * width;
                const startY = Math.random() * height;
                const targetX = x + offsetX;
                const targetY = y + offsetY;
                particles.push(new Particle(startX, startY, targetX, targetY));
              }
            }
          }
          
          // Invisible safety particle to ensure transition completes if text generation fails entirely
          if (particles.length === 0) {
            particles.push(new Particle(-100, -100, -100, -100));
          }

          particlesRef.current = particles;
        };

        if (stage === 'intro-forming' && particlesRef.current.length === 0) {
          initTextParticles();
        }

        const animate = () => {
          ctx.clearRect(0, 0, width, height);
          const currentParticles = particlesRef.current;
          
          for (let i = currentParticles.length - 1; i >= 0; i--) {
            const p = currentParticles[i];
            p.update(stage);
            p.draw(ctx);
            if (p.alpha <= 0 && stage === 'intro-scattering') {
              currentParticles.splice(i, 1);
            }
          }

          if (stage === 'intro-scattering' && currentParticles.length === 0) {
            try {
              if (window.parent) {
                window.parent.postMessage({ type: 'DOT_TRANSITION_COMPLETE' }, '*');
                if (typeof window.parent.onDotTransitionComplete === 'function') {
                  window.parent.onDotTransitionComplete();
                }
              }
            } catch(e) {}
            return;
          }

          animationRef.current = requestAnimationFrame(animate);
        };

        animate();

        const handleResize = () => {
          try {
            width = window.innerWidth || (window.parent ? window.parent.innerWidth : 1000);
            height = window.innerHeight || (window.parent ? window.parent.innerHeight : 800);
            if(width < 300) width = 1000;
            if(height < 300) height = 800;
            canvas.width = width;
            canvas.height = height;
            if (stage === 'intro-forming') {
              particlesRef.current = [];
              initTextParticles();
            }
          } catch(e) {}
        };

        window.addEventListener('resize', handleResize);
        return () => {
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animationRef.current);
        };
      }, [stage]);

      return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" />;
    };

    function App() {
      const [stage, setStage] = useState('intro-forming');

      useEffect(() => {
        // Absolute failsafe: force transition complete after 7 seconds regardless of particle state
        const maxFailTimeout = setTimeout(() => {
          try {
            if (window.parent) {
              window.parent.postMessage({ type: 'DOT_TRANSITION_COMPLETE' }, '*');
              if (typeof window.parent.onDotTransitionComplete === 'function') {
                window.parent.onDotTransitionComplete();
              }
            }
          } catch(e) {}
        }, 7000);

        return () => clearTimeout(maxFailTimeout);
      }, []);

      useEffect(() => {
        if (stage === 'intro-forming') {
          // Smoother, longer gathering phase (2.2s)
          const t1 = setTimeout(() => setStage('intro-holding'), 2200);
          return () => clearTimeout(t1);
        }
        if (stage === 'intro-holding') {
          // Hold the text longer (1.8s) before scattering
          const t2 = setTimeout(() => setStage('intro-scattering'), 1800); 
          return () => clearTimeout(t2);
        }
      }, [stage]);

      return (
        <div className="relative w-full h-screen overflow-hidden select-none bg-transparent">
          <CanvasBackground stage={stage} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
