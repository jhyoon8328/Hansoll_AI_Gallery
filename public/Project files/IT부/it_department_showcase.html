<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Department Showcase</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; background-color: #050505; margin: 0; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.Motion;

    // --- SUB TEXTS ---
    const SUB_TEXTS = [
      "현업과 AI와의 다리 역할",
      "통합 지식 센터",
      "기술 지원",
      "AI Transformation Leader",
      "Empowering Business with AI",
      "데이터 기반 혁신",
      "매끄러운 AI 통합",
      "미래를 여는 지능형 솔루션"
    ];

    const HARDCODED_MENUS = [
      { title: "mainPage", desc: "캐러셀 카드 뷰", icon: "layout-carousel" },
      { title: "Hansoll Vibe coding Gallery2", desc: "포털 갤러리 뷰 2", icon: "gallery-horizontal" },
      { title: "mainPageTest", desc: "그리드 카드 뷰", icon: "layout-grid" },
      { title: "main page dot1", desc: "인터랙티브 파티클 노드 뷰", icon: "network" }
    ];

    let MENUS = [...HARDCODED_MENUS];

    try {
      if (window.parent && window.parent.menuData) {
        const itData = window.parent.menuData.find(b => b.title === 'IT부');
        if (itData && itData.subItems) {
          const activeSubTitles = itData.subItems.map(sub => typeof sub === 'string' ? sub : sub.title);
          
          MENUS = activeSubTitles.map(title => {
             const existing = HARDCODED_MENUS.find(m => m.title === title);
             const subObj = itData.subItems.find(s => (s.title || s) === title);
             if (existing) {
                return { ...existing, desc: subObj?.description || existing.desc };
             } else {
                return { title: title, desc: subObj?.description || "", icon: "file-code" };
             }
          });
        }
      }
    } catch (e) {
      console.error(e);
    }

    // --- CANVAS PARTICLE SYSTEM ---
    class Particle {
      constructor(x, y, targetX, targetY) {
        this.x = x;
        this.y = y;
        this.targetX = targetX;
        this.targetY = targetY;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.radius = Math.random() * 1.5 + 0.5;
        this.baseAlpha = Math.random() * 0.5 + 0.5;
        this.alpha = 0;
        this.scattered = false;
        
        // Slight blue tint
        const b = Math.floor(200 + Math.random() * 55);
        this.color = `rgb(200, 220, ${b})`;
      }

      update(stage) {
        if (stage === 'intro-forming' || stage === 'intro-holding') {
          // Move towards target
          const dx = this.targetX - this.x;
          const dy = this.targetY - this.y;
          this.vx += dx * 0.005; // Spring strength
          this.vy += dy * 0.005;
          this.vx *= 0.85; // Friction
          this.vy *= 0.85;
          
          // Organic wobble
          this.x += this.vx + (Math.random() - 0.5) * 0.5;
          this.y += this.vy + (Math.random() - 0.5) * 0.5;
          
          if (this.alpha < this.baseAlpha) this.alpha += 0.01;
        } else if (stage === 'intro-scattering' || stage === 'exploding') {
          if (!this.scattered) {
            // Explode outward
            const angle = Math.random() * Math.PI * 2;
            const force = Math.random() * 15 + 5;
            this.vx = Math.cos(angle) * force;
            this.vy = Math.sin(angle) * force;
            this.scattered = true;
          }
          this.x += this.vx;
          this.y += this.vy;
          this.alpha -= 0.02; // Fade out
        }
      }

      draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    const CanvasBackground = ({ stage }) => {
      const canvasRef = useRef(null);
      const particlesRef = useRef([]);
      const animationRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const initTextParticles = () => {
          const offscreen = document.createElement('canvas');
          const oCtx = offscreen.getContext('2d', { willReadFrequently: true });
          
          const offW = Math.floor(Math.max(10, width * 0.8));
          const offH = Math.floor(Math.max(10, height * 0.7));
          offscreen.width = offW;
          offscreen.height = offH;
          
          // Reduced font size multiplier (0.15 -> 0.08) to prevent "Information" from clipping horizontally
          const fontSize = Math.max(30, Math.min(offW * 0.08, offH * 0.2));
          
          oCtx.fillStyle = 'black';
          oCtx.fillRect(0, 0, offW, offH);
          
          oCtx.fillStyle = 'white';
          oCtx.font = `900 ${fontSize}px Arial, sans-serif`;
          oCtx.textAlign = 'center';
          oCtx.textBaseline = 'middle';
          
          const text1 = "Information";
          const text2 = "Technology";
          
          oCtx.fillText(text1, offW / 2, offH / 2 - fontSize * 0.6);
          oCtx.fillText(text2, offW / 2, offH / 2 + fontSize * 0.6);

          const imageData = oCtx.getImageData(0, 0, offW, offH).data;
          const particles = [];
          
          // Step controls density
          const step = Math.max(Math.floor(offW / 250), 3); 
          
          const offsetX = (width - offW) / 2;
          const offsetY = (height - offH) / 2;

          for (let y = 0; y < offH; y += step) {
            for (let x = 0; x < offW; x += step) {
              const alpha = imageData[((y * offW + x) * 4) + 3]; // get alpha channel (or rgb since it's white on black)
              const red = imageData[((y * offW + x) * 4)];
              if (red > 128) {
                // Spawn from random positions
                const startX = Math.random() * width;
                const startY = Math.random() * height;
                const targetX = x + offsetX;
                const targetY = y + offsetY;
                particles.push(new Particle(startX, startY, targetX, targetY));
              }
            }
          }
          particlesRef.current = particles;
        };

        if (stage === 'intro-forming' && particlesRef.current.length === 0) {
          initTextParticles();
        }

        const animate = () => {
          ctx.clearRect(0, 0, width, height);

          // Update and draw particles
          const currentParticles = particlesRef.current;
          for (let i = currentParticles.length - 1; i >= 0; i--) {
            const p = currentParticles[i];
            p.update(stage);
            p.draw(ctx);
            if (p.alpha <= 0 && (stage === 'intro-scattering' || stage === 'exploding')) {
              currentParticles.splice(i, 1);
            }
          }

          animationRef.current = requestAnimationFrame(animate);
        };

        animate();

        const handleResize = () => {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
          if (stage === 'intro-forming') {
            particlesRef.current = [];
            initTextParticles();
          }
        };

        window.addEventListener('resize', handleResize);
        return () => {
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animationRef.current);
        };
      }, [stage]);

      return (
        <canvas 
          ref={canvasRef} 
          className="fixed inset-0 pointer-events-none z-0"
        />
      );
    };

    // --- FLOATING TEXT PHASE ---
    const FloatingText = ({ text, stage }) => {
      const [pos, setPos] = useState({ x: 0, y: 0 });
      const [delay] = useState(Math.random() * 2);
      const [duration] = useState(Math.random() * 8 + 10);
      const [color] = useState(() => {
        const colors = ['#60a5fa', '#a78bfa', '#34d399', '#f87171', '#e879f9', '#ffffff'];
        return colors[Math.floor(Math.random() * colors.length)];
      });
      
      useEffect(() => {
        setPos({
          x: Math.random() * 70 + 15, // 15% to 85% vw
          y: Math.random() * 70 + 15, // 15% to 85% vh
        });
      }, []);

      if (stage !== 'subtext') return null;

      return (
        <motion.div
          initial={{ opacity: 0, scale: 0.8, x: '-50%', y: '-50%' }}
          animate={{ 
            opacity: [0, 0.8, 0.8, 0],
            scale: [0.8, 1.2, 1.2, 0.9],
            top: [`${pos.y}%`, `${pos.y - (Math.random() * 10)}%`],
            left: [`${pos.x}%`, `${pos.x + (Math.random() * 10 - 5)}%`]
          }}
          transition={{
            duration: duration,
            delay: delay,
            repeat: Infinity,
            ease: "linear"
          }}
          className="absolute font-bold tracking-wide whitespace-nowrap"
          style={{
            color: color,
            textShadow: `0 0 15px ${color}80`,
            fontSize: `${Math.random() * 1 + 1}rem`,
            zIndex: 10
          }}
        >
          {text}
        </motion.div>
      );
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      // Stages: 'intro-forming' -> 'intro-holding' -> 'intro-scattering' -> 'subtext' -> 'exploding' -> 'menus'
      const [stage, setStage] = useState('intro-forming');

      useEffect(() => {
        if (stage === 'intro-forming') {
          const t1 = setTimeout(() => setStage('intro-holding'), 2000);
          return () => clearTimeout(t1);
        }
        if (stage === 'intro-holding') {
          const t2 = setTimeout(() => setStage('intro-scattering'), 4000);
          return () => clearTimeout(t2);
        }
        if (stage === 'intro-scattering') {
          const t3 = setTimeout(() => setStage('subtext'), 1500);
          return () => clearTimeout(t3);
        }
      }, [stage]);

      const handleScreenClick = () => {
        if (stage === 'subtext') {
          setStage('exploding');
          setTimeout(() => {
            setStage('menus');
            // Re-initialize Lucide icons when menus are shown
            setTimeout(() => {
              if (window.lucide) window.lucide.createIcons();
            }, 100);
          }, 500); // Quick transition
        }
      };

      return (
        <div 
          className="relative w-full h-screen overflow-hidden select-none"
          onClick={handleScreenClick}
        >
          {/* Canvas Background */}
          <CanvasBackground stage={stage} />

          {/* Floating Subtexts Layer */}
          <AnimatePresence>
            {stage === 'subtext' && (
              <motion.div 
                initial={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                transition={{ duration: 1 }}
                className="absolute inset-0 z-10 pointer-events-none"
              >
                {SUB_TEXTS.map((text, i) => (
                  <FloatingText key={i} text={text} stage={stage} />
                ))}
              </motion.div>
            )}
          </AnimatePresence>

          {/* Menus Phase */}
          <AnimatePresence>
            {stage === 'menus' && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                className="absolute inset-0 z-20 flex flex-col items-center justify-center p-8 bg-black/60 backdrop-blur-sm"
              >
                <div className="mb-12 text-center">
                  <motion.h2 
                    initial={{ y: -20, opacity: 0 }}
                    animate={{ y: 0, opacity: 1 }}
                    transition={{ delay: 0.2 }}
                    className="text-4xl font-extrabold tracking-tight text-white sm:text-5xl mb-4"
                  >
                    Information <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">Technology</span>
                  </motion.h2>
                </div>
                
                <div className="grid grid-cols-2 md:grid-cols-4 gap-6 px-4 max-w-5xl w-full">
                  {MENUS.map((m, idx) => (
                    <motion.div
                      key={idx}
                      initial={{ scale: 0.5, opacity: 0, y: 50 }}
                      animate={{ scale: 1, opacity: 1, y: 0 }}
                      transition={{ 
                        type: "spring",
                        stiffness: 260,
                        damping: 20,
                        delay: 0.3 + (idx * 0.1) 
                      }}
                      whileHover={{ 
                        scale: 1.05, 
                        y: -10,
                        boxShadow: "0 20px 40px rgba(0,0,0,0.5)"
                      }}
                      className="relative flex flex-col items-center justify-center aspect-square rounded-3xl bg-slate-800/60 border border-white/10 backdrop-blur-md cursor-pointer group transition-colors duration-300 hover:bg-slate-700/80 hover:border-white/20"
                      onClick={(e) => {
                        e.stopPropagation();
                        if (window.parent && window.parent.openSubMenu) {
                          window.parent.openSubMenu('IT부', m.title);
                        }
                      }}
                    >
                      <div className="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-slate-900/50 shadow-inner border border-white/5 text-slate-300 group-hover:text-blue-400 transition-colors duration-300">
                        <i data-lucide={m.icon} className="h-6 w-6"></i>
                      </div>
                      <h3 className="text-lg font-bold text-slate-100 mb-1 group-hover:text-white text-center px-4 leading-tight">
                        {m.title}
                      </h3>
                      <p className="text-xs font-medium text-slate-400 opacity-80 group-hover:opacity-100 text-center px-4">
                        {m.desc}
                      </p>
                    </motion.div>
                  ))}
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
