<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hansoll Textile AI Gallery</title>
  <!-- Empty favicon to prevent 404 -->
  <link rel="icon" href="data:,">
  <!-- Suppress Tailwind CDN warning -->
  <script>
    const originalWarn = console.warn;
    console.warn = function(...args) {
      if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
      originalWarn.apply(console, args);
    };
  </script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts & Custom Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    @font-face {
      font-family: 'Cafe24Ssurround';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/Cafe24Ssurround.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'Inter', 'sans-serif'],
            cafe24: ['Cafe24Ssurround', 'sans-serif'],
            nanum: ['"Nanum Pen Script"', 'cursive']
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            blue: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="h-screen bg-[#f5f7fb] text-slate-900 overflow-hidden flex">

  <!-- ==================== SIDEBAR ==================== -->
  <aside
    class="w-[280px] flex-shrink-0 flex flex-col bg-white border-r border-slate-200/80 shadow-[1px_0_10px_rgba(0,0,0,0.02)] z-40 transition-transform duration-300">
    <!-- Header / Logo -->
    <div class="flex h-[70px] shrink-0 items-center border-b border-slate-100 px-6" onclick="renderDashboard()">
      <div class="flex items-center gap-3 group w-full cursor-pointer">
        <div
          class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-white text-white shadow-md transition-transform duration-300 group-hover:scale-105 group-hover:rotate-3">
          <img src="imgFile/HS_logo.ico" alt="Hansoll Logo" class="h-6 w-6 object-contain" />
        </div>
        <div class="flex flex-col overflow-hidden">
          <span class="truncate text-xs font-bold uppercase tracking-wider text-slate-500">Hansoll Textile</span>
          <span
            class="truncate text-[17px] font-extrabold tracking-tight text-slate-900 group-hover:text-blue-600 transition-colors duration-200">AI GALLERY</span>
        </div>
      </div>
    </div>



    <!-- Navigation Menu (Dynamically populated by JS) -->
    <nav class="flex-1 overflow-y-auto p-4 custom-scrollbar">
      <div class="space-y-1">
        <p class="px-4 pb-2 text-xs font-bold tracking-wider text-slate-400 uppercase">Menu</p>
        <div id="menu-container"></div>
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="border-t border-slate-100 p-4 shrink-0 bg-slate-50/50 flex justify-center items-center">
      <img src="imgFile/HS_logo5.png" alt="Hansoll Textile Logo" class="w-4/5 h-auto object-contain opacity-80 hover:opacity-100 transition-opacity">
    </div>
  </aside>

  <!-- ==================== MAIN CONTENT AREA ==================== -->
  <div class="flex-1 flex flex-col min-w-0 transition-all duration-300">

    <!-- Header -->
    <header
      class="h-[70px] flex-shrink-0 flex items-center justify-between bg-white border-b border-slate-200/80 px-4 sm:px-8 z-30">
      <div class="flex items-center gap-4">
        <div class="flex items-center text-sm font-medium text-slate-500" id="breadcrumb">
          <span class="hover:text-blue-600 cursor-pointer transition-colors" onclick="renderDashboard()">시스템 관리</span>
          <span class="mx-2 text-slate-300">/</span>
          <span class="text-slate-900 font-semibold">대시보드</span>
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-4">
        <div class="relative hidden sm:block">
          <i data-lucide="search" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400 cursor-pointer hover:text-blue-500 transition-colors" onclick="triggerSearch()"></i>
          <input type="text" id="global-search-input" onkeydown="handleSearch(event)" oninput="document.getElementById('search-clear-btn').classList.toggle('hidden', !this.value)" placeholder="메뉴 검색..."
            class="h-9 w-48 rounded-full border border-slate-200 bg-slate-50 pl-9 pr-9 text-sm outline-none transition-all focus:border-blue-500 focus:bg-white focus:ring-1 focus:ring-blue-500">
          <button id="search-clear-btn" onclick="clearSearch()" class="absolute right-2.5 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400 hover:text-slate-600 hidden flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
            <i data-lucide="x" class="h-3.5 w-3.5"></i>
          </button>
        </div>
        <div class="h-6 w-px bg-slate-200 hidden sm:block mx-1"></div>

        <button id="header-admin-btn" onclick="promptAdminAuth()"
          class="ml-1 flex h-9 items-center gap-2 rounded-full border border-slate-200 bg-white p-1 pr-3 hover:bg-slate-50 transition-colors">
          <div class="flex h-7 w-7 items-center justify-center rounded-full bg-blue-100 text-blue-600">
            <i data-lucide="user" class="h-4 w-4"></i>
          </div>
          <span class="text-sm font-semibold text-slate-700 hidden sm:block">관리자</span>
        </button>
      </div>
    </header>

    <!-- Main Dashboard -->
    <main class="flex-1 overflow-y-auto custom-scrollbar flex relative">
      <!-- Global Back Button -->
      <button id="global-back-btn" onclick="goBack()" class="absolute top-6 left-6 z-50 flex items-center justify-center w-10 h-10 rounded-full shadow-lg transition-all duration-300 hidden group">
        <i data-lucide="arrow-left" class="w-5 h-5 transition-transform group-hover:-translate-x-1"></i>
      </button>

      <div id="main-content" class="w-full flex-1 flex flex-col relative z-0">
        <!-- Content gets rendered here via JS -->
      </div>
    </main>
  </div>

  <!-- JavaScript for dynamic routing and rendering -->
  <script>
    const defaultMenuData = [];
    let menuData = [];
    window.menuData = menuData;

    async function loadMenuData(isQuietRefresh) {
      try {
        const SUPABASE_URL_LOCAL = 'https://yuklsrhmcbdanswxysrw.supabase.co';
        const SUPABASE_ANON_KEY_LOCAL = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1a2xzcmhtY2JkYW5zd3h5c3J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNTgwODQsImV4cCI6MjA5NjYzNDA4NH0.PEgzBsLD6Or7P32ao6LaKgSmf-SE1ay829eFQpkzhgE';

        const res = await fetch(`${SUPABASE_URL_LOCAL}/rest/v1/MenuSetting?select=*`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY_LOCAL,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY_LOCAL}`
          },
          cache: 'no-store'
        });

        if(res.ok) {
          const flatData = await res.json();
          if (flatData && flatData.length > 0) {
            const categories = flatData.filter(d => d.menu_type === 'category' || d.menu_type === '카테고리');
            categories.sort((a, b) => ((a.menu_meta && a.menu_meta.sortOrder) || 0) - ((b.menu_meta && b.menu_meta.sortOrder) || 0));
            
            const reconstructedData = categories.map(cat => {
              const meta = cat.menu_meta || {};
              let subItems = flatData.filter(sub => sub.menu_type !== '카테고리' && sub.menu_type !== 'category' && (sub.menu_meta && sub.menu_meta.parentCategory === cat.menu_name)).map(sub => {
                const subMeta = sub.menu_meta || {};
                return {
                  title: sub.menu_name,
                  description: subMeta.description || "",
                  status: sub.YN_use ? 'Y' : 'N',
                  fileName: sub.file_path || "",
                  menuId: sub.MenuId || sub.menu_name,
                  urlAddress: sub.url_address || "",
                  sortOrder: subMeta.sortOrder || 0
                };
              });
              
              subItems.sort((a, b) => a.sortOrder - b.sortOrder);
              
              return {
                title: cat.menu_name,
                slug: meta.slug || "",
                imageUrl: meta.imageUrl || "",
                icon: meta.icon || "",
                status: cat.YN_use ? 'Y' : 'N',
                displayPhrase: meta.displayPhrase || "",
                bgColor: meta.bgColor || "",
                textColor: meta.textColor || "",
                subItems: subItems
              };
            });

            menuData = reconstructedData.filter(cat => (cat.status || 'Y') === 'Y').map(cat => ({
              ...cat,
              subItems: cat.subItems.filter(sub => (sub.status || 'Y') === 'Y')
            }));
            window.menuData = menuData;
          }
        }
        
        // MenualPage (말풍선/매뉴얼) 데이터 전체 로드 (MenuId 컬럼 부재 우회 및 검색 기능용)
        try {
          const manualRes = await fetch(`${SUPABASE_URL_LOCAL}/rest/v1/MenualPage?select=*`, {
            headers: {
              'apikey': SUPABASE_ANON_KEY_LOCAL,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY_LOCAL}`
            },
            cache: 'no-store'
          });
          if(manualRes.ok) {
            window.globalMenualData = await manualRes.json();
          } else {
            window.globalMenualData = [];
          }
        } catch(e) {
          window.globalMenualData = [];
        }
      } catch(e) {
        console.error("Failed to load menu data", e);
        // Alert if running locally without the server
        if (window.location.protocol === 'file:') {
          alert("서버(npm run dev)가 꺼져 있어 데이터를 불러오지 못했습니다.\n\n새로 만들어진 'Hansoll AI Portal 실행기.bat' 파일을 더블클릭하여 실행하시면 서버가 자동으로 켜지고 포털이 열립니다.");
        }
      }
      initMenu();
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await loadMenuData(true);
      const savedStateStr = sessionStorage.getItem('savedNavState');
      if (savedStateStr) {
        try {
          const savedState = JSON.parse(savedStateStr);
          restoreState(savedState);
        } catch(e) {
          renderDashboard();
        }
      } else {
        renderDashboard();
      }
    });

    // Global state
    let currentBrandSlug = null;
    let openMenuSlug = null;
    let openSubMenus = {};

    function initMenu() {
      const menuContainer = document.getElementById('menu-container');
      menuContainer.innerHTML = '';

      menuData.forEach((item) => {
        const isOpen = openMenuSlug === item.slug;
        const isActive = currentBrandSlug === item.slug;

        const wrapper = document.createElement('div');
        wrapper.className = "mb-2 last:mb-0";

        const btn = document.createElement('button');
        btn.className = `flex w-full items-center justify-between rounded-lg px-4 py-3 text-left transition-colors duration-200 ${isActive || isOpen ? 'bg-blue-50 text-blue-600' : 'text-slate-600 hover:bg-slate-50 hover:text-blue-600'}`;
        btn.innerHTML = `
          <div class="flex items-center gap-3">
            ${item.logoUrl ? `<img src="${item.logoUrl}" class="h-5 w-5 object-contain" alt="${item.title} logo" />` : `<i data-lucide="${item.icon}" class="h-5 w-5"></i>`}
            <span class="text-[15px] font-semibold">${item.title}</span>
          </div>
          <i data-lucide="${isOpen ? 'chevron-up' : 'chevron-down'}" class="h-4 w-4 text-slate-400"></i>
        `;

        const subContainer = document.createElement('div');
        subContainer.className = `overflow-hidden transition-all duration-300 ease-in-out ${isOpen ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`;

        const subList = document.createElement('div');
        subList.className = "mt-1 flex flex-col space-y-1 pl-11 pr-3 pb-2 pt-1";

        item.subItems.forEach((sub) => {
          const isObj = typeof sub === 'object';
          const subTitle = isObj ? sub.title : sub;
          const isHeader = isObj && sub.isHeader;
          const showHelp = isObj && sub.showHelpIcon;

          const children = isObj ? sub.children : null;

          if (isHeader) {
            const headerDiv = document.createElement('div');
            headerDiv.className = "mt-2 flex flex-col first:mt-0";

            const isSubOpen = openSubMenus[subTitle]; // Track state globally

            const headerBtn = document.createElement('button');
            headerBtn.className = "relative flex items-center justify-between px-3 py-2 text-sm font-bold text-slate-700 hover:text-blue-600 transition-colors select-none w-full text-left rounded-md hover:bg-slate-50";
            headerBtn.innerHTML = `
              <span class="truncate">${subTitle}</span>
              ${children && children.length > 0 ? `<i data-lucide="${isSubOpen ? 'chevron-up' : 'chevron-down'}" class="h-3.5 w-3.5 text-slate-400"></i>` : ''}
            `;

            headerDiv.appendChild(headerBtn);

            if (children && children.length > 0) {
              const childrenContainer = document.createElement('div');
              childrenContainer.className = `flex flex-col space-y-1 pl-4 mt-1 overflow-hidden transition-all duration-300 ease-in-out ${isSubOpen ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0'}`;

              children.forEach(child => {
                const childTitle = child.title;
                const childDesc = child.description || "이 메뉴에 대한 설명입니다. 현재 테스트를 위해 200자 내외로 작성된 임시 텍스트입니다. 추후 각 메뉴의 실제 기능 및 용도에 맞는 상세한 설명으로 업데이트될 예정입니다.";
                const childMenuId = child.menuId || childTitle;
                const childBtn = document.createElement('a');
                childBtn.href = "#";
                childBtn.className = `relative flex items-center justify-between rounded-md px-3 py-2 text-sm font-medium transition-colors duration-200 text-slate-500 hover:bg-slate-50 hover:text-blue-600 pl-6 text-[13px]`;
                childBtn.innerHTML = `
                  <span class="truncate">${childTitle}</span>
                  <div class="p-1 -mr-1 shrink-0 z-10 cursor-pointer text-slate-400 hover:text-blue-500 transition-colors" onclick="showMenuTooltip(event, '${childMenuId.replace(/'/g, "\\'")}', '${childTitle.replace(/'/g, "\\'")}', '${childDesc.replace(/'/g, "\\'")}')">
                    <i data-lucide="help-circle" class="h-3.5 w-3.5"></i>
                  </div>
                `;
                childBtn.onclick = (e) => {
                  e.stopPropagation();
                  openSubMenu(item.title, childTitle);
                };
                childrenContainer.appendChild(childBtn);
              });

              headerDiv.appendChild(childrenContainer);
            }

            headerBtn.onclick = (e) => {
              e.stopPropagation();
              openSubMenus[subTitle] = !isSubOpen;
              initMenu(); // Re-render to show/hide

              if (subTitle === "사업 3부") {
                renderDept3Showcase();
              }
            };

            subList.appendChild(headerDiv);
            return;
          }

          const subDesc = (isObj ? sub.description : null) || "이 메뉴에 대한 설명입니다. 현재 테스트를 위해 200자 내외로 작성된 임시 텍스트입니다. 추후 각 메뉴의 실제 기능 및 용도에 맞는 상세한 설명으로 업데이트될 예정입니다.";
          const subMenuId = (isObj ? sub.menuId : null) || subTitle;
          const subBtn = document.createElement('a');
          subBtn.href = "#";
          subBtn.className = `relative flex items-center justify-between rounded-md px-3 py-2 text-sm font-medium transition-colors duration-200 text-slate-500 hover:bg-slate-50 hover:text-blue-600 pl-6 text-[13px]`;
          subBtn.innerHTML = `
            <span class="truncate">${subTitle}</span>
            <div class="p-1 -mr-1 shrink-0 z-10 cursor-pointer text-slate-400 hover:text-blue-500 transition-colors" onclick="showMenuTooltip(event, '${subMenuId.replace(/'/g, "\\'")}', '${subTitle.replace(/'/g, "\\'")}', '${subDesc.replace(/'/g, "\\'")}')">
              <i data-lucide="help-circle" class="h-3.5 w-3.5"></i>
            </div>
          `;
          subBtn.onclick = (e) => {
            e.stopPropagation();
            openSubMenu(item.title, subTitle);
          };
          subList.appendChild(subBtn);
        });

        subContainer.appendChild(subList);

        btn.onclick = () => {
          if (isOpen) {
            openMenuSlug = null;
            initMenu();
          } else {
            openMenuSlug = item.slug;
            const iframe = document.querySelector('iframe[title="Admin Page"]');
            if (iframe) {
              // Admin page is open, just toggle the accordion without navigating away
              initMenu();
            } else {
              startBrandTransition(item.slug);
            }
          }
        };

        wrapper.appendChild(btn);
        wrapper.appendChild(subContainer);
        menuContainer.appendChild(wrapper);
      });

      lucide.createIcons();
    }

    function updateBreadcrumb(primary, secondary) {
      document.getElementById('breadcrumb').innerHTML = `
        <span class="hover:text-blue-600 cursor-pointer transition-colors" onclick="renderDashboard()">${primary}</span>
        <span class="mx-2 text-slate-300">/</span>
        <span class="text-slate-900 font-semibold">${secondary}</span>
      `;
    }

    let navHistory = [];
    let isNavigatingBack = false;

    function pushNavState(state) {
      if (isNavigatingBack) {
        isNavigatingBack = false;
        return;
      }
      const last = navHistory[navHistory.length - 1];
      if (last && JSON.stringify(last) === JSON.stringify(state)) return;
      navHistory.push(state);
      sessionStorage.setItem('savedNavState', JSON.stringify(state));
      updateBackButtonVisibility();
    }

    function goBack() {
      if (navHistory.length <= 1) return;
      navHistory.pop(); // discard current
      const prevState = navHistory[navHistory.length - 1]; // peek
      isNavigatingBack = true;
      restoreState(prevState);
      updateBackButtonVisibility();
    }

    function updateBackButtonVisibility() {
      const btn = document.getElementById('global-back-btn');
      if (!btn) return;
      if (navHistory.length > 1) {
        btn.classList.remove('hidden');
      } else {
        btn.classList.add('hidden');
      }
    }

    function setBackButtonTheme(theme) {
      const btn = document.getElementById('global-back-btn');
      if (!btn) return;
      btn.className = "absolute top-6 left-6 z-50 flex items-center justify-center w-10 h-10 rounded-full shadow-lg transition-all duration-300 group " + (navHistory.length > 1 ? "" : "hidden");
      
      if (theme === 'dark') { // Light background -> Dark button
        btn.classList.add('bg-white', 'text-slate-800', 'border', 'border-slate-200', 'hover:bg-slate-100');
      } else { // Dark background -> Light button
        btn.classList.add('bg-slate-800/50', 'text-white', 'border', 'border-white/10', 'hover:bg-slate-800/80', 'backdrop-blur-md');
      }
    }

    function restoreState(state) {
      if (!state) return;
      if (state.type === 'dashboard') {
        renderDashboard();
      } else if (state.type === 'brand') {
        renderBrandPage(state.slug, true);
      } else if (state.type === 'submenu') {
        openSubMenu(state.brand, state.sub);
      } else if (state.type === 'dept3') {
        renderDept3Showcase();
      } else if (state.type === 'search') {
        renderSearchResults(state.keyword);
      } else if (state.type === 'admin') {
        openAdminPage();
      }
    }

    function canNavigate() {
      const iframe = document.querySelector('iframe[title="Admin Page"]');
      if (iframe) {
        if(confirm("관리자 페이지에서 나가시겠습니까?\n작업 중이던 내용이 유실될 수 있습니다.")) {
          updateAdminButtonState(false);
          return true;
        } else {
          return false;
        }
      }
      return true;
    }

    function updateAdminButtonState(isLoggedIn) {
      const btn = document.getElementById('header-admin-btn');
      if (!btn) return;
      if (isLoggedIn) {
        btn.innerHTML = `
          <div class="flex h-7 w-7 items-center justify-center rounded-full bg-rose-100 text-rose-600">
            <i data-lucide="log-out" class="h-4 w-4"></i>
          </div>
          <span class="text-sm font-semibold text-slate-700 hidden sm:block">나가기</span>
        `;
        btn.onclick = exitAdminPage;
        btn.classList.replace('hover:bg-slate-50', 'hover:bg-rose-50');
      } else {
        btn.innerHTML = `
          <div class="flex h-7 w-7 items-center justify-center rounded-full bg-blue-100 text-blue-600">
            <i data-lucide="user" class="h-4 w-4"></i>
          </div>
          <span class="text-sm font-semibold text-slate-700 hidden sm:block">관리자</span>
        `;
        btn.onclick = promptAdminAuth;
        btn.classList.replace('hover:bg-rose-50', 'hover:bg-slate-50');
      }
      lucide.createIcons();
    }

    function exitAdminPage() {
      renderDashboard();
    }

    function openAdminPage(isRestore = false) {
      if (!isRestore) {
        pushNavState({ type: 'admin' });
      }
      updateAdminButtonState(true);
      setBackButtonTheme('dark');
      updateBreadcrumb("시스템 관리", "관리자 대시보드");
      
      const content = document.getElementById('main-content');
      content.innerHTML = `
        <div class="w-full h-full relative bg-slate-50">
          <iframe src="adminPage.html" class="w-full h-full border-none absolute inset-0" title="Admin Page"></iframe>
        </div>
      `;
    }

    function triggerSearch() {
      const input = document.getElementById('global-search-input');
      if (!input) return;
      const keyword = input.value.trim().toLowerCase();
      if (!keyword) {
         renderDashboard();
         return;
      }
      renderSearchResults(keyword);
    }

  <script>
    let currentEditMenuId = null;
    let currentEditMenuTitle = null;
    let currentEditEventTarget = null;
    let currentDefaultDesc = null;
    const ADMIN_PW = "admin0000";
    const SUPABASE_URL = 'https://yuklsrhmcbdanswxysrw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1a2xzcmhtY2JkYW5zd3h5c3J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNTgwODQsImV4cCI6MjA5NjYzNDA4NH0.PEgzBsLD6Or7P32ao6LaKgSmf-SE1ay829eFQpkzhgE';

    async function getTooltipDataFromSupabase(menuId) {
      try {
        if (window.globalMenualData) {
          // MenuId 컬럼을 기준으로 식별하여 최신 데이터 가져오기
          const manualEntries = window.globalMenualData.filter(m => m.MenuId === menuId);
          if (manualEntries.length > 0) {
            manualEntries.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const manualEntry = manualEntries[0];
            return {
              title: manualEntry.Title,
              reason: manualEntry.Reason,
              description: manualEntry.HowToUse,
              keywords: manualEntry.KeyWord,
              password: manualEntry.PassWord
            };
          }
        }
      } catch (e) {
        console.error("Failed to parse tooltip data", e);
      }
      
      // Supabase 데이터 없을 시 기존 localStorage에서 Fallback 조회
      try {
        const data = JSON.parse(localStorage.getItem('hansoll_tooltips')) || {};
        return data[menuId] || null;
      } catch(e) { return null; }
    }

    function setTooltipData(title, dataObj) {
      try {
        const data = JSON.parse(localStorage.getItem('hansoll_tooltips')) || {};
        data[title] = dataObj;
        localStorage.setItem('hansoll_tooltips', JSON.stringify(data));
      } catch(e) {}
    }

    async function showMenuTooltip(event, menuId, title, desc) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
        currentDefaultDesc = desc;
      }
      
      await openTooltipDetail(menuId, title);
    }

    async function openTooltipDetail(menuId, title) {
      // 로딩 중 표시가 필요할 수도 있으나 빠른 조회를 가정
      const data = await getTooltipDataFromSupabase(menuId) || {};
      currentEditMenuId = menuId;
      currentEditMenuTitle = title;
      
      const displayTitle = title;
      const displayReason = data.reason || "(등록된 이유가 없습니다)";
      const displayDesc = data.description || currentDefaultDesc || "(등록된 설명이 없습니다)";
      
      document.getElementById('detail-title').textContent = displayTitle;
      document.getElementById('detail-reason').textContent = displayReason;
      document.getElementById('detail-desc').textContent = displayDesc;
      
      document.getElementById('tooltip-detail-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeTooltipDetail() {
      document.getElementById('tooltip-detail-modal').classList.add('hidden');
    }

    function openTooltipAuth() {
      document.getElementById('tooltip-pw-input').value = "";
      document.getElementById('tooltip-auth-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('tooltip-pw-input').focus(), 50);
    }

    function closeTooltipAuth() {
      document.getElementById('tooltip-auth-modal').classList.add('hidden');
    }

    async function verifyTooltipAuth() {
      const pwInput = document.getElementById('tooltip-pw-input').value;
      const data = await getTooltipDataFromSupabase(currentEditMenuId);
      const expectedPw = data ? data.password : "1234";
      const masterPw = localStorage.getItem("hansoll_admin_pw") || "admin0000";

      if (pwInput === expectedPw || pwInput === masterPw) {
        closeTooltipAuth();
        await openTooltipEditForm();
      } else {
        alert("비밀번호가 일치하지 않습니다.");
      }
    }

    async function openTooltipEditForm() {
      const data = await getTooltipDataFromSupabase(currentEditMenuId) || {};
      document.getElementById('edit-title').value = data.title || currentEditMenuTitle;
      document.getElementById('edit-reason').value = data.reason || "";
      document.getElementById('edit-desc').value = data.description || currentDefaultDesc || "";
      document.getElementById('edit-keywords').value = data.keywords || "";
      document.getElementById('edit-pw').value = data.password || "1234";
      
      document.getElementById('tooltip-edit-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    function closeTooltipEditForm() {
      document.getElementById('tooltip-edit-modal').classList.add('hidden');
    }

    function promptAdminAuth() {
      document.getElementById('admin-id-input').value = "";
      document.getElementById('admin-pw-input').value = "";
      document.getElementById('page-admin-auth-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('admin-id-input').focus(), 50);
    }

    function closePageAdminAuth() {
      document.getElementById('page-admin-auth-modal').classList.add('hidden');
    }

    function verifyPageAdminAuth() {
      const id = document.getElementById('admin-id-input').value;
      const pw = document.getElementById('admin-pw-input').value;
      const savedPw = localStorage.getItem("hansoll_admin_pw") || "admin0000";
      
      if (id === "admin" && pw === savedPw) {
        closePageAdminAuth();
        updateAdminButtonState(true);
        openAdminPage();
      } else {
        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
      }
    }

    async function saveTooltipData() {
      const title = document.getElementById('edit-title').value.trim();
      const reason = document.getElementById('edit-reason').value.trim();
      const desc = document.getElementById('edit-desc').value.trim();
      const keywords = document.getElementById('edit-keywords').value.trim();
      const pw = document.getElementById('edit-pw').value.trim();

      if (pw.length < 4 || pw.length > 8) {
        alert("비밀번호는 4~8자 사이로 입력해주세요.");
        return;
      }

      const payload = {
        MenuId: currentEditMenuId,
        Title: title,
        Reason: reason,
        HowToUse: desc,
        KeyWord: keywords,
        PassWord: pw
      };

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/MenualPage`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errText = await response.text();
          console.error("Supabase 저장 실패:", errText);
          alert("데이터베이스 저장에 실패했습니다.");
        } else {
          console.log("Supabase 저장 성공!");
        }
      } catch (e) {
        console.error("네트워크 오류:", e);
        alert("네트워크 통신 오류가 발생했습니다.");
      }

      setTooltipData(currentEditMenuId, {
        title: title,
        reason: reason,
        description: desc,
        keywords: keywords,
        password: pw
      });

      closeTooltipEditForm();
      
      // Re-open tooltip immediately to show updated content
      showMenuTooltip(null, currentEditMenuId, currentEditMenuTitle, currentDefaultDesc);
    }

    // Modals no longer close on background click to prevent accidental data loss,
    // they require clicking the explicit Close/Cancel buttons.


  </script>
